<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Lens | AI Research Summarizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @media print {
            body {
                background-color: white !important;
            }
            body * {
                visibility: hidden;
            }
            #resultContainer, #resultContainer * {
                visibility: visible;
            }
            #resultContainer {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
            }
            /* Specifically hide the UI elements during print */
            button[onclick="window.print()"], 
            nav, 
            #uploadForm, 
            .text-center,
            #loader {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <nav class="bg-white shadow-sm py-4 mb-8">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600"><i class="fas fa-microscope mr-2"></i>Paper Lens</h1>
            <span class="text-sm text-slate-500">AI-Powered Paper Analysis</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pb-20">
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-8 border border-slate-100">
            <div class="text-center mb-6">
                <h2 class="text-xl font-semibold text-slate-800">Upload Research Paper</h2>
                <p class="text-slate-500 text-sm">PDF or Word format supported (Up to 20+ pages)</p>
            </div>

            <form id="uploadForm" class="space-y-4">
                <div id="dropZone" class="border-2 border-dashed border-indigo-200 rounded-xl p-10 flex flex-col items-center justify-center bg-indigo-50/30 hover:bg-indigo-50 transition-all cursor-pointer">
                    <i class="fas fa-cloud-upload-alt text-4xl text-indigo-400 mb-3"></i>
                    <p class="text-slate-600">Drag & drop or <span class="text-indigo-600 font-medium">browse</span></p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx">
                    <p id="fileName" class="mt-3 text-sm font-medium text-indigo-700 hidden"></p>
                </div>

                <button type="submit" id="summarizeBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition-all flex justify-center items-center gap-2">
                    <span>Summarize Paper</span>
                    <i class="fas fa-magic"></i>
                </button>
            </form>
        </div>

        <div id="loader" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-slate-600 animate-pulse">Reading through the pages and extracting insights...</p>
        </div>

        <div id="resultContainer" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-slate-800">Research Insights</h2>
                <button onclick="window.print()" class="text-sm text-indigo-600 hover:underline"><i class="fas fa-download mr-1"></i> Save as PDF</button>
            </div>
            
            <div id="summaryContent" class="prose prose-indigo max-w-none bg-white p-8 rounded-2xl shadow-md border border-slate-100">
                </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
